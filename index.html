<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Eventos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ececea;
    --text: #1a1a18; --text2: #6b6b68; --text3: #9c9a92;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --teal: #1D9E75; --teal-bg: #E1F5EE; --teal-text: #0F6E56;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --coral-bg: #FAECE7; --coral-text: #712B13;
    --red: #E24B4A; --red-bg: #FCEBEB;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;
      --text: #e8e6df; --text2: #9c9a92; --text3: #6b6b68;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --teal-bg: #04342C; --teal-text: #9FE1CB;
      --blue-bg: #042C53; --blue-text: #B5D4F4;
      --amber-bg: #412402; --amber-text: #FAC775;
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --coral-bg: #4A1B0C; --coral-text: #F5C4B3;
      --red-bg: #501313;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 380px; }
  .auth-title { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
  .auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  #app { display: none; min-height: 100vh; }
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-weight: 500; font-size: 16px; }
  .main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }
  .tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 1.5rem; }
  .tab { flex: 1; padding: 7px 8px; border: none; background: none; border-radius: 5px; cursor: pointer; font-size: 13px; color: var(--text2); font-family: inherit; text-align: center; }
  .tab.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .form-grid { display: grid; gap: 10px; margin-bottom: 10px; }
  .cols-2 { grid-template-columns: 1fr 1fr; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); }
  textarea { resize: vertical; min-height: 60px; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-teal { background: var(--teal-bg); color: var(--teal-text); border-color: transparent; }
  .btn-danger { color: var(--red); border-color: transparent; font-size: 12px; padding: 4px 10px; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .badge-teal { background: var(--teal-bg); color: var(--teal-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); }
  .badge-coral { background: var(--coral-bg); color: var(--coral-text); }
  .badge-gray { background: var(--bg2); color: var(--text2); }
  .event-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .event-item:last-child { border-bottom: none; }
  .event-name { font-weight: 500; font-size: 15px; }
  .event-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .supplier-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .supplier-row:last-child { border-bottom: none; }
  .supplier-info { flex: 1; }
  .supplier-name { font-weight: 500; font-size: 14px; }
  .supplier-meta { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 8px; }
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 1px; background: var(--border2); }
  .tl-item { position: relative; margin-bottom: 18px; }
  .tl-dot { position: absolute; left: -17px; top: 4px; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--bg); }
  .tl-time { font-size: 11px; color: var(--text3); }
  .tl-name { font-size: 14px; font-weight: 500; }
  .tl-detail { font-size: 12px; color: var(--text2); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }
  .progress-bar { background: var(--bg2); border-radius: 4px; height: 7px; overflow: hidden; margin: 6px 0 4px; }
  .progress-fill { height: 100%; border-radius: 4px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .chip { padding: 4px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-family: inherit; }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  @media (max-width: 520px) { .cols-2 { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">Gestor de Eventos</div>
    <div class="auth-sub" id="auth-subtitle">Entre na sua conta</div>
    <div class="form-grid" style="margin-bottom:10px">
      <div><label>E-mail</label><input type="email" id="auth-email" placeholder="seu@email.com"></div>
      <div><label>Senha</label><input type="password" id="auth-password" placeholder="Mínimo 6 caracteres"></div>
    </div>
    <div id="auth-name-wrap" style="display:none;margin-bottom:10px">
      <label>Seu nome</label><input type="text" id="auth-name" placeholder="Como quer ser chamado">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="submitAuth()">Entrar</button>
    <button class="btn" style="width:100%;font-size:13px" onclick="toggleAuthMode()">
      <span id="auth-toggle-text">Não tem conta? Cadastre-se</span>
    </button>
    <div id="auth-error" style="color:var(--red);font-size:13px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Gestor de Eventos</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="topbar-user" style="font-size:12px;color:var(--text2)"></span>
      <button class="btn btn-sm" onclick="signOut()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">Visão Geral</button>
      <button class="tab" onclick="switchTab('events')">Eventos</button>
      <button class="tab" onclick="switchTab('suppliers')">Fornecedores</button>
      <button class="tab" onclick="switchTab('timeline')">Cronograma</button>
    </div>
    <div class="section active" id="sec-overview"><div id="overview-content"></div></div>
    <div class="section" id="sec-events">
      <div class="card">
        <div class="card-title" id="event-form-title">Novo evento</div>
        <div class="form-grid cols-2">
          <div style="grid-column:1/-1"><label>Nome do evento</label><input type="text" id="e-name" placeholder="Ex: Casamento Ana & João"></div>
          <div><label>Data</label><input type="date" id="e-date"></div>
          <div><label>Local</label><input type="text" id="e-venue" placeholder="Ex: Espaço Villa Verde"></div>
          <div><label>Horário início</label><input type="time" id="e-start"></div>
          <div><label>Horário término</label><input type="time" id="e-end"></div>
          <div><label>Nº de convidados</label><input type="number" id="e-guests" min="0" placeholder="Ex: 150"></div>
          <div><label>Orçamento total (R$)</label><input type="number" id="e-budget" min="0" step="0.01" placeholder="Ex: 15000"></div>
        </div>
        <div><label>Descrição</label><textarea id="e-desc" placeholder="Detalhes adicionais..."></textarea></div>
        <div class="actions">
          <button class="btn" onclick="cancelEventEdit()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveEvent()">Salvar evento</button>
        </div>
      </div>
      <div class="card"><div class="card-title">Seus eventos</div><div id="events-list"></div></div>
    </div>
    <div class="section" id="sec-suppliers">
      <div id="no-event-msg" class="card" style="text-align:center;color:var(--text2)">
        Selecione um evento na aba <strong>Eventos</strong> para gerenciar fornecedores.
      </div>
      <div id="suppliers-content" style="display:none">
        <div class="card">
          <div class="card-title">Adicionar fornecedor</div>
          <div class="form-grid cols-2">
            <div><label>Nome</label><input type="text" id="s-name" placeholder="Ex: Buffet Brasil"></div>
            <div><label>Categoria</label>
              <select id="s-cat">
                <option value="alimentacao">Alimentação</option>
                <option value="som">Som / AV</option>
                <option value="decoracao">Decoração</option>
                <option value="seguranca">Segurança</option>
                <option value="limpeza">Limpeza</option>
                <option value="transporte">Transporte</option>
                <option value="foto">Foto / Vídeo</option>
                <option value="outros">Outros</option>
              </select>
            </div>
            <div><label>Chegada</label><input type="time" id="s-arrival"></div>
            <div><label>Saída</label><input type="time" id="s-departure"></div>
            <div><label>Qtd. de pessoas</label><input type="number" id="s-qty" min="1" placeholder="Ex: 5"></div>
            <div><label>Contato</label><input type="text" id="s-contact" placeholder="Nome ou telefone"></div>
            <div><label>Valor estimado (R$)</label><input type="number" id="s-value" min="0" step="0.01" placeholder="0,00"></div>
            <div><label>Observações</label><input type="text" id="s-notes" placeholder="Info adicional..."></div>
          </div>
          <div class="actions">
            <button class="btn" onclick="clearSupplierForm()">Limpar</button>
            <button class="btn btn-primary" onclick="saveSupplier()">Adicionar</button>
          </div>
        </div>
        <div class="filters">
          <button class="chip active" onclick="setFilter('all',this)">Todos</button>
          <button class="chip" onclick="setFilter('alimentacao',this)">Alimentação</button>
          <button class="chip" onclick="setFilter('som',this)">Som / AV</button>
          <button class="chip" onclick="setFilter('decoracao',this)">Decoração</button>
          <button class="chip" onclick="setFilter('seguranca',this)">Segurança</button>
          <button class="chip" onclick="setFilter('foto',this)">Foto / Vídeo</button>
          <button class="chip" onclick="setFilter('outros',this)">Outros</button>
        </div>
        <div class="card" id="suppliers-list"></div>
      </div>
    </div>
    <div class="section" id="sec-timeline"><div id="timeline-content"></div></div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://zteumjnplkgtbqxfdwec.supabase.co';
var SUPABASE_KEY = 'sb_publishable_fWi5IH9U4MaeXngJhYa3CQ_kBXomqu2';

var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var jsPDF = window.jspdf ? window.jspdf.jsPDF : null;
var authMode = 'login';
var editingEventId = null;
var notifTimers = [];
var S = { user: null, events: [], selected: null, suppliers: [], filter: 'all' };
var CL = { alimentacao:'Alimentação', som:'Som / AV', decoracao:'Decoração', seguranca:'Segurança', limpeza:'Limpeza', transporte:'Transporte', foto:'Foto / Vídeo', outros:'Outros' };
var CC = { alimentacao:'badge-teal', som:'badge-blue', decoracao:'badge-purple', seguranca:'badge-coral', limpeza:'badge-blue', transporte:'badge-amber', foto:'badge-purple', outros:'badge-gray' };
var DC = { alimentacao:'#1D9E75', som:'#378ADD', decoracao:'#7F77DD', seguranca:'#D85A30', limpeza:'#378ADD', transporte:'#BA7517', foto:'#7F77DD', outros:'#888780' };

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-subtitle').textContent = authMode === 'login' ? 'Entre na sua conta' : 'Crie sua conta';
  document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Entrar';
  document.getElementById('auth-name-wrap').style.display = authMode === 'signup' ? 'block' : 'none';
}

async function submitAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var pass = document.getElementById('auth-password').value;
  var err = document.getElementById('auth-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Preencha e-mail e senha.'; return; }
  if (authMode === 'signup') {
    var name = document.getElementById('auth-name').value.trim();
    var r = await sb.auth.signUp({ email: email, password: pass, options: { data: { name: name } } });
    if (r.error) { err.textContent = r.error.message; return; }
    err.style.color = 'var(--teal)';
    err.textContent = 'Conta criada! Tente fazer login agora.';
    authMode = 'login';
    document.getElementById('auth-subtitle').textContent = 'Entre na sua conta';
    document.getElementById('auth-toggle-text').textContent = 'Não tem conta? Cadastre-se';
    document.getElementById('auth-name-wrap').style.display = 'none';
  } else {
    var r2 = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (r2.error) { err.textContent = 'E-mail ou senha incorretos.'; }
  }
}

async function signOut() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  S = { user: null, events: [], selected: null, suppliers: [], filter: 'all' };
}

function switchTab(t) {
  var names = ['overview','events','suppliers','timeline'];
  document.querySelectorAll('.tab').forEach(function(el,i){ el.classList.toggle('active', names[i]===t); });
  document.querySelectorAll('.section').forEach(function(el,i){ el.classList.toggle('active', 'sec-'+names[i]==='sec-'+t); });
  if (t==='overview') renderOverview();
  if (t==='events') renderEvents();
  if (t==='suppliers') renderSuppliers();
  if (t==='timeline') renderTimeline();
}

async function loadEvents() {
  var r = await sb.from('events').select('*').order('date',{ascending:true});
  S.events = r.data || [];
}

async function saveEvent() {
  var p = {
    user_id: S.user.id,
    name: document.getElementById('e-name').value.trim(),
    date: document.getElementById('e-date').value || null,
    venue: document.getElementById('e-venue').value.trim(),
    start_time: document.getElementById('e-start').value || null,
    end_time: document.getElementById('e-end').value || null,
    guests: parseInt(document.getElementById('e-guests').value) || null,
    budget: parseFloat(document.getElementById('e-budget').value) || null,
    description: document.getElementById('e-desc').value.trim()
  };
  if (!p.name) { alert('Informe o nome do evento.'); return; }
  if (editingEventId) {
    await sb.from('events').update(p).eq('id', editingEventId);
    if (S.selected && S.selected.id === editingEventId) S.selected = Object.assign({}, S.selected, p);
    editingEventId = null;
    document.getElementById('event-form-title').textContent = 'Novo evento';
  } else {
    var r = await sb.from('events').insert(p).select().single();
    if (!S.selected && r.data) S.selected = r.data;
  }
  clearEventForm();
  await loadEvents();
  renderEvents();
}

function clearEventForm() {
  ['e-name','e-date','e-venue','e-start','e-end','e-guests','e-budget','e-desc'].forEach(function(id){ document.getElementById(id).value=''; });
}

function cancelEventEdit() { editingEventId=null; clearEventForm(); document.getElementById('event-form-title').textContent='Novo evento'; }

function editEvent(ev) {
  editingEventId = ev.id;
  document.getElementById('event-form-title').textContent = 'Editar evento';
  document.getElementById('e-name').value = ev.name||'';
  document.getElementById('e-date').value = ev.date||'';
  document.getElementById('e-venue').value = ev.venue||'';
  document.getElementById('e-start').value = ev.start_time ? ev.start_time.slice(0,5) : '';
  document.getElementById('e-end').value = ev.end_time ? ev.end_time.slice(0,5) : '';
  document.getElementById('e-guests').value = ev.guests||'';
  document.getElementById('e-budget').value = ev.budget||'';
  document.getElementById('e-desc').value = ev.description||'';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function deleteEvent(id) {
  if (!confirm('Excluir este evento e todos os fornecedores?')) return;
  await sb.from('events').delete().eq('id',id);
  if (S.selected && S.selected.id===id) { S.selected=null; S.suppliers=[]; }
  await loadEvents(); renderEvents();
}

async function selectEvent(ev) {
  S.selected = ev;
  document.getElementById('topbar-title').textContent = ev.name;
  await loadSuppliers();
  renderEvents(); renderOverview();
}

function renderEvents() {
  var el = document.getElementById('events-list');
  if (!S.events.length) { el.innerHTML='<div class="empty">Nenhum evento ainda. Crie o primeiro acima.</div>'; return; }
  el.innerHTML = S.events.map(function(ev) {
    var sel = S.selected && S.selected.id===ev.id;
    var d = ev.date ? new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '';
    var ej = JSON.stringify(ev);
    return '<div class="event-item" onclick=\'selectEvent('+ej+')\'>' +
      '<div><div class="event-name">'+ev.name+(sel?' <span class="badge badge-teal" style="font-size:10px">selecionado</span>':'')+'</div>' +
      '<div class="event-meta">'+[d,ev.venue].filter(Boolean).join(' · ')+'</div></div>' +
      '<div style="display:flex;gap:6px" onclick="event.stopPropagation()">' +
        '<button class="btn btn-sm" onclick=\'editEvent('+ej+')\'>Editar</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteEvent(\''+ev.id+'\')">Excluir</button>' +
      '</div></div>';
  }).join('');
}

async function loadSuppliers() {
  if (!S.selected) return;
  var r = await sb.from('suppliers').select('*').eq('event_id',S.selected.id).order('arrival_time',{ascending:true});
  S.suppliers = r.data || [];
}

async function saveSupplier() {
  if (!S.selected) { alert('Selecione um evento primeiro.'); return; }
  var name = document.getElementById('s-name').value.trim();
  if (!name) { document.getElementById('s-name').focus(); return; }
  await sb.from('suppliers').insert({
    event_id: S.selected.id, user_id: S.user.id, name: name,
    category: document.getElementById('s-cat').value,
    arrival_time: document.getElementById('s-arrival').value || null,
    departure_time: document.getElementById('s-departure').value || null,
    qty: parseInt(document.getElementById('s-qty').value) || null,
    contact: document.getElementById('s-contact').value.trim(),
    value: parseFloat(document.getElementById('s-value').value) || null,
    notes: document.getElementById('s-notes').value.trim()
  });
  clearSupplierForm();
  await loadSuppliers();
  renderSuppliers();
  scheduleNotifications();
}

function clearSupplierForm() {
  ['s-name','s-arrival','s-departure','s-qty','s-contact','s-value','s-notes'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('s-cat').value='alimentacao';
}

async function deleteSupplier(id) {
  await sb.from('suppliers').delete().eq('id',id);
  await loadSuppliers(); renderSuppliers();
}

function setFilter(f,btn) {
  S.filter=f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderSuppliers();
}

function renderSuppliers() {
  var ne=document.getElementById('no-event-msg'), sc=document.getElementById('suppliers-content');
  if (!S.selected) { ne.style.display='block'; sc.style.display='none'; return; }
  ne.style.display='none'; sc.style.display='block';
  var el=document.getElementById('suppliers-list');
  var list = S.filter==='all' ? S.suppliers : S.suppliers.filter(function(s){ return s.category===S.filter; });
  if (!S.suppliers.length) { el.innerHTML='<div class="empty">Nenhum fornecedor ainda.</div>'; return; }
  if (!list.length) { el.innerHTML='<div class="empty">Nenhum fornecedor nessa categoria.</div>'; return; }
  el.innerHTML = list.map(function(s) {
    var meta=[s.arrival_time?'Chegada: '+fmt(s.arrival_time):null,s.departure_time?'Saída: '+fmt(s.departure_time):null,s.qty?'Equipe: '+s.qty+'p':null,s.contact||null,s.value?fmtMoney(s.value):null].filter(Boolean);
    return '<div class="supplier-row"><div class="supplier-info">' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="supplier-name">'+s.name+'</span><span class="badge '+(CC[s.category]||'badge-gray')+'">'+(CL[s.category]||s.category)+'</span></div>' +
      '<div class="supplier-meta">'+meta.map(function(m){return '<span>'+m+'</span>';}).join('')+'</div>' +
      (s.notes?'<div style="font-size:12px;color:var(--text3);margin-top:3px;font-style:italic">'+s.notes+'</div>':'')+
      '</div><button class="btn btn-danger" onclick="deleteSupplier(\''+s.id+'\')">Remover</button></div>';
  }).join('');
}

function renderTimeline() {
  var el=document.getElementById('timeline-content');
  if (!S.selected) { el.innerHTML='<div class="card"><div class="empty">Selecione um evento primeiro.</div></div>'; return; }
  var ev=S.selected;
  var sorted=S.suppliers.filter(function(s){return s.arrival_time;}).sort(function(a,b){return a.arrival_time.localeCompare(b.arrival_time);});
  var noTime=S.suppliers.filter(function(s){return !s.arrival_time;});
  var total=S.suppliers.reduce(function(s,x){return s+(x.value||0);},0);
  var d=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  el.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">' +
      '<div><div style="font-size:18px;font-weight:500">'+ev.name+'</div>'+(d?'<div style="font-size:13px;color:var(--text2)">'+d+'</div>':'')+
      '</div><button class="btn btn-teal btn-sm" onclick="exportPDF()">Exportar PDF</button>' +
    '</div>'+
    (sorted.length?'<div class="card"><div class="timeline">'+sorted.map(function(s){
      return '<div class="tl-item"><div class="tl-dot" style="background:'+(DC[s.category]||'#888')+'"></div>'+
        '<div class="tl-time">'+fmt(s.arrival_time)+(s.departure_time?' → '+fmt(s.departure_time):'')+'</div>'+
        '<div class="tl-name">'+s.name+' <span class="badge '+(CC[s.category]||'badge-gray')+'" style="font-size:10px">'+(CL[s.category]||s.category)+'</span></div>'+
        ([s.qty?s.qty+'p':null,s.contact].filter(Boolean).length?'<div class="tl-detail">'+[s.qty?s.qty+'p':null,s.contact].filter(Boolean).join(' · ')+'</div>':'')+
        '</div>';
    }).join('')+'</div></div>':'')+
    (noTime.length?'<div class="card"><div style="font-size:13px;color:var(--text2);margin-bottom:8px">Sem horário definido</div>'+noTime.map(function(s){return '<div style="padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px">'+s.name+' <span class="badge '+(CC[s.category]||'badge-gray')+'" style="font-size:10px;margin-left:4px">'+(CL[s.category]||s.category)+'</span></div>';}).join('')+'</div>':'')+
    (total>0?'<div class="card" style="font-size:14px;color:var(--text2)">Total comprometido: <strong style="color:var(--text)">'+fmtMoney(total)+'</strong></div>':'');
}

function renderOverview() {
  var el=document.getElementById('overview-content');
  var uname=S.user&&S.user.user_metadata&&S.user.user_metadata.name?S.user.user_metadata.name:'produtor';
  if (!S.selected) {
    el.innerHTML='<div class="card"><div style="font-size:16px;font-weight:500;margin-bottom:8px">Olá, '+uname+'!</div>' +
      '<div style="font-size:14px;color:var(--text2);margin-bottom:16px">Você tem <strong>'+S.events.length+'</strong> evento(s). Selecione um na aba <strong>Eventos</strong>.</div>' +
      '<button class="btn btn-primary" onclick="switchTab(\'events\')">Ver eventos →</button></div>';
    return;
  }
  var ev=S.selected;
  var total=S.suppliers.reduce(function(s,x){return s+(x.value||0);},0);
  var budget=parseFloat(ev.budget)||0;
  var pct=budget>0?Math.min(100,Math.round(total/budget*100)):null;
  var bc=pct>90?'#E24B4A':pct>70?'#EF9F27':'#1D9E75';
  var d=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  var parts=[d,ev.venue,ev.start_time&&ev.end_time?fmt(ev.start_time)+' – '+fmt(ev.end_time):''].filter(Boolean).join(' · ');
  var up=S.suppliers.filter(function(s){return s.arrival_time;}).sort(function(a,b){return a.arrival_time.localeCompare(b.arrival_time);}).slice(0,5);
  el.innerHTML=
    '<div style="margin-bottom:1.25rem"><div style="font-size:20px;font-weight:500">'+ev.name+'</div>'+(parts?'<div style="font-size:13px;color:var(--text2)">'+parts+'</div>':'')+
    '</div><div class="stats">' +
      '<div class="stat"><div class="stat-label">Fornecedores</div><div class="stat-value">'+S.suppliers.length+'</div></div>'+
      '<div class="stat"><div class="stat-label">Convidados</div><div class="stat-value">'+(ev.guests||'—')+'</div></div>'+
      '<div class="stat"><div class="stat-label">Comprometido</div><div class="stat-value" style="font-size:14px">'+(total>0?fmtMoney(total):'—')+'</div></div>'+
    '</div>'+
    (pct!==null?'<div class="card"><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text2)">Orçamento utilizado</span><span style="font-weight:500">'+pct+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+bc+'"></div></div><div class="progress-labels"><span>'+fmtMoney(total)+'</span><span>Meta: '+fmtMoney(budget)+'</span></div></div>':'')+
    (up.length?'<div class="card"><div class="card-title">Próximos a chegar</div>'+up.map(function(s){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)"><div><span style="font-weight:500;font-size:14px">'+s.name+'</span> <span class="badge '+(CC[s.category]||'badge-gray')+'" style="font-size:10px;margin-left:4px">'+(CL[s.category]||s.category)+'</span></div><span style="font-size:13px;color:var(--text2)">'+fmt(s.arrival_time)+'</span></div>';}).join('')+'</div>':'');
}

function exportPDF() {
  if (!S.selected||!jsPDF) return;
  var ev=S.selected, doc=new jsPDF(), y=20;
  doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.text(ev.name,14,y); y+=10;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(100);
  if (ev.date){doc.text(new Date(ev.date+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),14,y);y+=6;}
  if (ev.venue){doc.text('Local: '+ev.venue,14,y);y+=6;}
  if (ev.start_time){doc.text('Horário: '+fmt(ev.start_time)+(ev.end_time?' – '+fmt(ev.end_time):''),14,y);y+=6;}
  if (ev.guests){doc.text('Convidados: '+ev.guests,14,y);y+=6;}
  y+=6; doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(0);
  doc.text('Cronograma de Fornecedores',14,y); y+=8;
  var sorted=S.suppliers.filter(function(s){return s.arrival_time;}).sort(function(a,b){return a.arrival_time.localeCompare(b.arrival_time);});
  var noTime=S.suppliers.filter(function(s){return !s.arrival_time;});
  sorted.concat(noTime).forEach(function(s){
    if(y>270){doc.addPage();y=20;}
    doc.setTextColor(0); doc.setFontSize(10);
    var t=s.arrival_time?fmt(s.arrival_time)+(s.departure_time?' → '+fmt(s.departure_time):''):'Horário a definir';
    doc.setFont('helvetica','bold'); doc.text(t,14,y);
    doc.setFont('helvetica','normal'); doc.text(s.name+' — '+(CL[s.category]||s.category),50,y); y+=5;
    var det=[s.qty?'Equipe: '+s.qty+'p':null,s.contact||null,s.value?fmtMoney(s.value):null,s.notes||null].filter(Boolean).join(' · ');
    if(det){doc.setTextColor(120);doc.setFontSize(9);doc.text(det,50,y);y+=5;}
    y+=2;
  });
  var total=S.suppliers.reduce(function(s,x){return s+(x.value||0);},0);
  if(total>0){y+=4;doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(0);doc.text('Total: '+fmtMoney(total),14,y);}
  doc.save(ev.name.replace(/\s+/g,'-').toLowerCase()+'-cronograma.pdf');
}

function scheduleNotifications() {
  notifTimers.forEach(function(t){clearTimeout(t);}); notifTimers=[];
  if (!S.selected||!S.selected.date) return;
  if (S.selected.date !== new Date().toISOString().slice(0,10)) return;
  S.suppliers.filter(function(s){return s.arrival_time;}).forEach(function(s){
    var p=s.arrival_time.split(':'), n=new Date();
    n.setHours(parseInt(p[0]),parseInt(p[1])-15,0,0);
    var ms=n-new Date();
    if(ms>0) notifTimers.push(setTimeout(function(){showBanner(s.name+' chega em 15 min ('+fmt(s.arrival_time)+')');},ms));
  });
}

function showBanner(msg) {
  var el=document.getElementById('notif-banner');
  el.textContent=msg; el.style.display='block';
  setTimeout(function(){el.style.display='none';},5000);
  if(typeof Notification!=='undefined'&&Notification.permission==='granted') new Notification('Gestor de Eventos',{body:msg});
}

function fmt(t) { if(!t) return '—'; var p=t.slice(0,5).split(':'); return parseInt(p[0])+'h'+(p[1]!=='00'?p[1]:''); }
function fmtMoney(v) { return parseFloat(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

sb.auth.onAuthStateChange(function(ev, session) {
  if (session && session.user) {
    S.user=session.user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    var n=session.user.user_metadata&&session.user.user_metadata.name?session.user.user_metadata.name:session.user.email;
    document.getElementById('topbar-user').textContent=n;
    loadEvents().then(function(){
      if(S.events.length>0) selectEvent(S.events[0]).then(function(){renderOverview();});
      else renderOverview();
    });
    if(typeof Notification!=='undefined'&&Notification.permission==='default') Notification.requestPermission();
  }
});
</script>
</body>
</html>
